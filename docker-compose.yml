services:
  # ── FastAPI backend tại :8000 ─────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/phantomla/ai-mutil-agent-backend:latest}
    build:
      context: .
      target: backend
    container_name: ai-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8000"
    volumes:
      - ./config/vertex-ai.json:/app/config/vertex-ai.json:ro
      - ./data:/app/data
      # - ${GAME_PROJECT_DIR:-/tmp}:/game:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Next.js UI static server tại :3001 ───────────────────────────────────
  ui:
    image: ${UI_IMAGE:-ghcr.io/phantomla/ai-mutil-agent-ui:latest}
    build:
      context: .
      target: ui
    container_name: ai-agent-ui
    ports:
      - "3001:3001"
    restart: unless-stopped
